services:
  - type: web
    name: syncup-app
    env: node
    plan: free
    rootDir: .
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install && npm run build"
    startCommand: "node backend/dist/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: syncup-redis
          property: connectionString

  - type: redis
    name: syncup-redis
    plan: free
    ipAllowList: []
